name: Daily Activity Log

on:
  schedule:
    - cron: "0 12 * * *"  # every day at 12:00 UTC
  workflow_dispatch:       # allow manual trigger

permissions:
  contents: write

jobs:
  log-activity:
    name: Append daily entry to activity-log.md
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_TOKEN }}

      - name: Append today's entry
        run: |
          DATE=$(date -u +"%Y-%m-%d")
          TIME=$(date -u +"%H:%M UTC")
          echo "- ${DATE} @ ${TIME} — daily check-in" >> activity-log.md

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add activity-log.md
          git diff --cached --quiet || git commit -m "chore: daily activity log $(date -u +%Y-%m-%d)"
          git push
