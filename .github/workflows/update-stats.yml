name: Update GitHub Stats

on:
  schedule:
    - cron: "0 12 * * *"  # every day at 12:00 UTC
  workflow_dispatch:       # allow manual trigger

permissions:
  contents: write

jobs:
  update-stats:
    name: Fetch GitHub stats and update README
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_TOKEN }}

      - name: Fetch stats and update README
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          python3 - <<'PYEOF'
          import urllib.request, json, re, os
          from datetime import datetime, timezone

          token    = os.environ["GH_TOKEN"]
          username = "luisarg03"
          headers  = {"Authorization": f"token {token}", "User-Agent": "github-actions"}

          def fetch(url):
              req = urllib.request.Request(url, headers=headers)
              with urllib.request.urlopen(req) as r:
                  return json.loads(r.read())

          user  = fetch(f"https://api.github.com/users/{username}")
          repos = fetch(f"https://api.github.com/users/{username}/repos?per_page=100&type=owner")

          public_repos = user["public_repos"]
          followers    = user["followers"]
          following    = user["following"]
          stars        = sum(r["stargazers_count"] for r in repos)
          updated      = datetime.now(timezone.utc).strftime("%Y-%m-%d %H:%M UTC")

          new_block = f"""<!--START_SECTION:github-stats-->
<div align="center">

| Metric | Value |
|--------|-------|
| Public Repos | {public_repos} |
| Total Stars | {stars} |
| Followers | {followers} |
| Following | {following} |

*Last updated: {updated}*

</div>
<!--END_SECTION:github-stats-->"""

          with open("README.md", "r") as f:
              content = f.read()

          pattern     = r"<!--START_SECTION:github-stats-->.*?<!--END_SECTION:github-stats-->"
          new_content = re.sub(pattern, new_block, content, flags=re.DOTALL)

          with open("README.md", "w") as f:
              f.write(new_content)

          print(f"Stats updated — repos:{public_repos} stars:{stars} followers:{followers}")
          PYEOF

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          git diff --cached --quiet || git commit -m "chore: update github stats $(date -u +%Y-%m-%d)"
          git push
