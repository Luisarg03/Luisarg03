name: Update GitHub Stats
# re-register: force GitHub to re-parse this workflow

on:
  schedule:
    - cron: "10 12 * * *"  # every day at 12:10 UTC
  workflow_dispatch:       # allow manual trigger

permissions:
  contents: write

jobs:
  update-stats:
    name: Fetch GitHub stats and update README
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_TOKEN }}

      - name: Fetch stats and update README
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          python3 - <<'PYEOF'
          import json
          import os
          import re
          import textwrap
          import urllib.request
          from datetime import datetime, timezone

          token = os.environ["GH_TOKEN"]
          username = "luisarg03"
          headers = {"Authorization": f"token {token}", "User-Agent": "github-actions"}

          def fetch(url):
              req = urllib.request.Request(url, headers=headers)
              with urllib.request.urlopen(req) as response:
                  return json.loads(response.read())

          user = fetch(f"https://api.github.com/users/{username}")
          repos = fetch(f"https://api.github.com/users/{username}/repos?per_page=100&type=owner")

          public_repos = user["public_repos"]
          followers = user["followers"]
          following = user["following"]
          stars = sum(repo["stargazers_count"] for repo in repos)
          updated = datetime.now(timezone.utc).strftime("%Y-%m-%d %H:%M UTC")

          new_block = textwrap.dedent(
              f"""\
              <!--START_SECTION:github-stats-->
              <div align="center">

              | Metric | Value |
              |--------|-------|
              | Public Repos | {public_repos} |
              | Total Stars | {stars} |
              | Followers | {followers} |
              | Following | {following} |

              *Last updated: {updated}*

              </div>
              <!--END_SECTION:github-stats-->
              """
          )

          with open("README.md", "r", encoding="utf-8") as readme_file:
              content = readme_file.read()

          pattern = r"<!--START_SECTION:github-stats-->.*?<!--END_SECTION:github-stats-->"
          new_content = re.sub(pattern, new_block, content, flags=re.DOTALL)

          with open("README.md", "w", encoding="utf-8") as readme_file:
              readme_file.write(new_content)

          print(f"Stats updated — repos:{public_repos} stars:{stars} followers:{followers}")
          PYEOF

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          git diff --cached --quiet || git commit -m "chore: update github stats $(date -u +%Y-%m-%d)"
          git push
